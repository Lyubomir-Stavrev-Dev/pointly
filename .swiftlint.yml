# SwiftLint Configuration for Pointly

# Paths to include during linting
included:
  - Pointly

# Paths to ignore during linting
excluded:
  - Carthage
  - Pods
  - .build
  - build

# Rules to disable
disabled_rules:
  - trailing_whitespace
  - todo

# Rules to enable
opt_in_rules:
  - empty_count
  - empty_string
  - first_where
  - force_unwrapping
  - implicit_return
  - joined_default_parameter
  - literal_expression_end_indentation
  - modifier_order
  - nimble_operator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - switch_case_on_newline
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

# Rule configurations
line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 5
  error: 8

type_body_length:
  warning: 200
  error: 350

file_length:
  warning: 400
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level:
    warning: 3
    error: 6
  function_level:
    warning: 5
    error: 10

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 40
    error: 60
  excluded:
    - id
    - x
    - y

# Custom rules
custom_rules:
  pointly_naming:
    name: "Pointly Naming Convention"
    regex: "class|struct|enum|protocol"
    match_kinds:
      - identifier
    message: "Use proper naming conventions for types"
    severity: warning
