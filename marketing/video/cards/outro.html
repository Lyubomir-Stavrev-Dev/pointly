<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1920px; height:1080px; overflow:hidden; }
  body {
    background:#07070f;
    background-image: radial-gradient(1200px 700px at 50% 118%, rgba(244,100,77,0.22), transparent 62%),
                      linear-gradient(160deg, #12101f 0%, #0a0912 55%, #07070f 100%);
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; text-align:center;
  }
  .icon { width:176px; height:176px; border-radius:40px; box-shadow:0 24px 80px rgba(244,100,77,0.35); margin-bottom:44px; }
  h1 { font-size:120px; font-weight:800; letter-spacing:-0.02em;
       background:linear-gradient(90deg,#F4644D,#FF8C42);
       -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .rule { width:220px; height:6px; border-radius:3px; margin:34px 0 40px;
          background:linear-gradient(90deg,#F4644D,#FF8C42,#E9458C); }
  .cta { font-size:44px; font-weight:700; color:#fff; }
  .url { font-size:30px; font-weight:600; color:rgba(255,255,255,0.55); margin-top:18px; letter-spacing:0.02em; }
</style></head>
<body>
  <img class="icon" src="icon.png" alt="">
  <h1>Pointly</h1>
  <div class="rule"></div>
  <div class="cta">Free on the Mac App Store</div>
  <div class="url">trypointly.com</div>
</body></html>
