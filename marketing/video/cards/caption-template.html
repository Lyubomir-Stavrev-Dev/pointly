<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  /* Transparent lower-third caption, composited over footage by ffmpeg. */
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1920px; height:1080px; overflow:hidden; background:transparent; }
  body {
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .pill {
    margin-bottom:72px;
    display:flex; align-items:center; gap:22px;
    background:rgba(7,7,15,0.82);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:22px;
    padding:26px 44px;
    box-shadow:0 18px 60px rgba(0,0,0,0.45);
  }
  .tick { width:12px; height:44px; border-radius:6px; flex:none;
          background:linear-gradient(180deg,#F4644D,#FF8C42); }
  .txt { font-size:46px; font-weight:700; color:#fff; letter-spacing:-0.01em; white-space:nowrap; }
</style></head>
<body>
  <div class="pill"><div class="tick"></div><div class="txt">__CAPTION__</div></div>
</body></html>
