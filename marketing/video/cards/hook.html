<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1920px; height:1080px; overflow:hidden; }
  body {
    background:#07070f;
    background-image: radial-gradient(1000px 600px at 50% -20%, rgba(233,69,140,0.14), transparent 60%),
                      linear-gradient(160deg, #12101f 0%, #0a0912 55%, #07070f 100%);
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    display:flex; align-items:center; justify-content:center;
    color:#fff; text-align:center;
  }
  h1 { font-size:108px; font-weight:800; letter-spacing:-0.02em; line-height:1.1; max-width:1500px; }
  h1 em { font-style:normal;
          background:linear-gradient(90deg,#F4644D,#FF8C42);
          -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
</style></head>
<body>
  <h1>There's a <em>better way.</em></h1>
</body></html>
