<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; cursor:default; }
  html,body { width:100vw; height:100vh; overflow:hidden; }
  body { background:#f6f7f9; font-family:-apple-system,"SF Pro Text",sans-serif; }
  /* pinned layout so automation coordinates are deterministic */
  .panel { position:absolute; top:340px; left:50%; transform:translateX(-50%); width:920px; background:#fff; border:1px solid #e8eaee; border-radius:18px; box-shadow:0 14px 44px rgba(20,20,40,0.07); padding:44px 52px; }
  h1 { font-size:30px; font-weight:800; color:#111; margin-bottom:6px; }
  .sub { font-size:16px; color:#8a8f98; margin-bottom:36px; }
  .row { display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-top:1px solid #f0f1f4; }
  .row .l b { display:block; font-size:17px; color:#222; margin-bottom:3px; }
  .row .l span { font-size:14px; color:#989ca5; }
  .val { font-family:"SF Mono",ui-monospace,monospace; font-size:16px; color:#333; background:#f4f5f7; padding:9px 16px; border-radius:9px; }
  .badge { font-size:12px; font-weight:700; color:#1eab6b; background:#e7f7ef; padding:5px 12px; border-radius:20px; margin-left:12px; }
</style></head>
<body>
  <div class="panel">
    <h1>Workspace settings</h1>
    <div class="sub">Production environment · Admin access</div>
    <div class="row"><div class="l"><b>Live API key</b><span>Full access — keep this secret</span></div>
      <div class="val">demo_key_9f2KxT81mQvR4pWnJ6Ye3AbZ</div></div>
    <div class="row"><div class="l"><b>Billing owner</b><span>Receives invoices and receipts</span></div>
      <div class="val">lyubomir@trypointly.com</div></div>
    <div class="row"><div class="l"><b>Webhook status</b><span>Endpoint health, last 24h</span></div>
      <div><span class="val">wh_prod_endpoint_04</span><span class="badge">HEALTHY</span></div></div>
  </div>
</body></html>
