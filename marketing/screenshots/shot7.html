<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="style.css"></head>
<body>
<div class="frame">
  <div class="bg-grad"></div>

  <div class="copy">
    <span class="eyebrow">Presenter Cues · Pro</span>
    <h1 class="headline">Every click,<br><span class="accent">visible.</span></h1>
    <p class="subhead">Show clicks and keystrokes right on screen. Your tutorials and streams become effortless to follow — no more "wait, what did you press?"</p>
  </div>

  <!-- Screen: an app being demoed, with cue overlays -->
  <div class="stage dark">
    <div class="winbar dark">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="wintitle" style="color:#6b6b78;">Figma — Onboarding</span>
    </div>
    <div style="position:relative; height:calc(100% - 44px); background:#14141c; overflow:hidden;">
      <!-- simple UI mock -->
      <div style="display:flex; gap:20px; padding:56px 44px;">
        <div style="flex:1;background:#1d1d28;border-radius:14px;height:150px;"></div>
        <div style="flex:1;background:#1d1d28;border-radius:14px;height:150px;"></div>
      </div>
      <div style="padding:0 44px;">
        <div style="height:16px;width:60%;background:#22222f;border-radius:6px;margin-bottom:14px;"></div>
        <div style="height:16px;width:44%;background:#22222f;border-radius:6px;"></div>
      </div>

      <!-- Click ripple -->
      <div style="position:absolute; left:250px; top:150px; width:64px; height:64px; border-radius:50%;
        border:3px solid #F4644D; opacity:0.9;"></div>
      <div style="position:absolute; left:270px; top:170px; width:24px; height:24px; border-radius:50%;
        background:rgba(244,100,77,0.55);"></div>

      <!-- Keystroke pill row (bottom center) -->
      <div style="position:absolute; left:50%; bottom:40px; transform:translateX(-50%); display:flex; gap:10px;">
        <div style="font:700 26px -apple-system; color:#fff; padding:12px 18px; border-radius:12px;
          background:rgba(7,7,15,0.92); border:1px solid rgba(244,100,77,0.6); box-shadow:0 12px 30px rgba(0,0,0,0.5);">⌘</div>
        <div style="font:700 26px -apple-system; color:#fff; padding:12px 20px; border-radius:12px;
          background:rgba(7,7,15,0.92); border:1px solid rgba(244,100,77,0.6); box-shadow:0 12px 30px rgba(0,0,0,0.5);">K</div>
      </div>
    </div>
  </div>
</div>
</body></html>
