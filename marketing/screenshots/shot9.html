<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="style.css"></head>
<body>
<div class="frame">
  <div class="bg-grad"></div>

  <div class="copy">
    <span class="eyebrow">Countdown Timer · Pro</span>
    <h1 class="headline">Keep the<br>room <span class="accent">on time.</span></h1>
    <p class="subhead">A beautiful on-screen countdown for breaks, workshops, and time-boxed exercises. Start it, and everyone knows exactly how long is left.</p>
  </div>

  <!-- Screen: a workshop slide with the timer floating over it -->
  <div class="stage dark">
    <div class="winbar dark">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="wintitle" style="color:#6b6b78;">Workshop — Break</span>
    </div>
    <div style="position:relative; height:calc(100% - 44px); background:#14141c; overflow:hidden;">
      <div style="padding:80px 56px;">
        <div style="font:800 42px -apple-system; color:#e9e9f0; letter-spacing:-1px;">Back in a moment ☕</div>
        <div style="font:400 20px/1.6 -apple-system; color:#7a7a88; margin-top:16px; max-width:420px;">
          Grab a coffee — we resume when the timer hits zero.
        </div>
      </div>

      <!-- Floating timer card -->
      <div style="position:absolute; right:46px; bottom:46px; width:210px; padding:18px 16px;
        border-radius:18px; background:rgba(7,7,15,0.94); border:1px solid rgba(244,100,77,0.55);
        box-shadow:0 24px 60px rgba(0,0,0,0.55), 0 0 40px rgba(244,100,77,0.2);">
        <div style="font:800 10px -apple-system; letter-spacing:0.16em; color:rgba(255,255,255,0.35); margin-bottom:8px;">TIMER</div>
        <div style="font:800 52px -apple-system; color:#fff; letter-spacing:-1px; text-align:center;">2:30</div>
        <div style="display:flex; gap:6px; margin-top:12px;">
          <div style="flex:1; text-align:center; font:700 12px -apple-system; color:#fff; padding:8px 0;
            border-radius:9px; background:linear-gradient(135deg,#F4644D,#FF8C42);">Pause</div>
          <div style="width:38px; text-align:center; font:700 12px -apple-system; color:rgba(255,255,255,0.7);
            padding:8px 0; border-radius:9px; border:1px solid rgba(255,255,255,0.2);">↺</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body></html>
