<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="style.css"></head>
<body>
<div class="frame">
  <div class="bg-grad"></div>

  <div class="copy">
    <span class="eyebrow">Callout &amp; Step Badges · Pro</span>
    <h1 class="headline">Walk them<br><span class="accent">through it.</span></h1>
    <p class="subhead">Drop auto-numbered steps and labeled callouts that point at exactly what matters. Perfect for docs, walkthroughs, and onboarding.</p>
  </div>

  <!-- Screen: a settings UI with numbered steps + a callout -->
  <div class="stage dark">
    <div class="winbar dark">
      <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
      <span class="wintitle" style="color:#6b6b78;">System Settings — Privacy</span>
    </div>
    <div style="position:relative; height:calc(100% - 44px); background:#14141c; overflow:hidden;">
      <!-- rows -->
      <div style="padding:44px 44px 0;">
        <div style="display:flex; align-items:center; gap:16px; background:#1d1d28; border-radius:12px; padding:18px 22px; margin-bottom:14px;">
          <div style="width:34px;height:34px;border-radius:9px;background:#2a2a38;"></div>
          <div style="height:14px;width:180px;background:#2a2a38;border-radius:5px;"></div>
        </div>
        <div style="display:flex; align-items:center; gap:16px; background:#1d1d28; border-radius:12px; padding:18px 22px; margin-bottom:14px;">
          <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#F4644D,#E9458C);"></div>
          <div style="height:14px;width:230px;background:#2a2a38;border-radius:5px;"></div>
        </div>
        <div style="display:flex; align-items:center; gap:16px; background:#1d1d28; border-radius:12px; padding:18px 22px;">
          <div style="width:34px;height:34px;border-radius:9px;background:#2a2a38;"></div>
          <div style="height:14px;width:150px;background:#2a2a38;border-radius:5px;"></div>
        </div>
      </div>

      <!-- Step badges -->
      <div style="position:absolute; left:150px; top:70px; width:46px; height:46px; border-radius:50%;
        background:linear-gradient(135deg,#F4644D,#E9458C); border:2px solid #fff;
        display:flex; align-items:center; justify-content:center; font:800 22px -apple-system; color:#fff;
        box-shadow:0 0 0 8px rgba(244,100,77,0.18), 0 10px 24px rgba(0,0,0,0.5);">1</div>
      <div style="position:absolute; left:150px; top:158px; width:46px; height:46px; border-radius:50%;
        background:linear-gradient(135deg,#F4644D,#E9458C); border:2px solid #fff;
        display:flex; align-items:center; justify-content:center; font:800 22px -apple-system; color:#fff;
        box-shadow:0 0 0 8px rgba(244,100,77,0.18), 0 10px 24px rgba(0,0,0,0.5);">2</div>

      <!-- Callout: leader line + label box pointing at row 2 -->
      <svg style="position:absolute; inset:0; width:100%; height:100%;" fill="none">
        <path d="M470 175 L610 120" stroke="#F4644D" stroke-width="3" stroke-linecap="round"/>
        <circle cx="470" cy="175" r="6" fill="#F4644D"/>
      </svg>
      <div style="position:absolute; left:610px; top:96px; padding:12px 16px; border-radius:10px;
        background:rgba(7,7,15,0.94); border:1.5px solid #F4644D; color:#fff; font:600 15px -apple-system;
        box-shadow:0 12px 30px rgba(0,0,0,0.5);">Enable this one</div>
    </div>
  </div>
</div>
</body></html>
